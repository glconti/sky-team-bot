<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sky Team</title>
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
  <style>
    :root {
      color-scheme: light dark;
      --border: rgba(127, 127, 127, 0.35);
      --panel: rgba(127, 127, 127, 0.08);
      --panel-strong: rgba(127, 127, 127, 0.16);
      --text-muted: rgba(127, 127, 127, 0.8);
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: var(--tg-theme-bg-color, #111);
      color: var(--tg-theme-text-color, #f5f5f5);
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(16px + var(--safe-bottom, 0px));
    }
    .app-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .app-title {
      font-size: 20px;
      font-weight: 600;
    }
    .meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .message {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .message.info {
      background: rgba(78, 158, 255, 0.12);
      border-color: rgba(78, 158, 255, 0.3);
    }
    .message.error {
      background: rgba(255, 107, 107, 0.14);
      border-color: rgba(255, 107, 107, 0.4);
    }
    .message.warning {
      background: rgba(255, 200, 87, 0.14);
      border-color: rgba(255, 200, 87, 0.4);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .panel-title {
      font-weight: 600;
      margin-bottom: 8px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    .grid.two {
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
    .seat-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed var(--border);
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(78, 158, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .seat-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .seat-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .seat-role {
      font-size: 12px;
      color: var(--text-muted);
    }
    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--panel-strong);
      font-size: 12px;
    }
    .badge.active {
      background: rgba(78, 158, 255, 0.22);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: inherit;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary {
      background: rgba(78, 158, 255, 0.25);
      border-color: rgba(78, 158, 255, 0.5);
    }
    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }
    input,
    select {
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: inherit;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      min-width: 120px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 160px;
    }
    .form-field span {
      font-size: 12px;
      color: var(--text-muted);
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat:last-child {
      border-bottom: none;
    }
    .card {
      background: var(--panel-strong);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px;
    }
    .card-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .muted {
      color: var(--text-muted);
      font-size: 12px;
    }
    details {
      margin-top: 12px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">Sky Team Mini App</div>
      <div id="meta" class="meta"></div>
    </header>

    <div id="message" class="message info" hidden></div>

    <section id="lobby" class="panel" hidden>
      <div class="panel-title">Lobby</div>
      <div id="lobby-status" class="status-line"></div>
      <div id="lobby-seats" class="grid two"></div>
      <div id="lobby-actions" class="button-row" style="margin-top: 12px;"></div>
      <div id="lobby-note" class="muted" style="margin-top: 8px;"></div>
    </section>

    <section id="game" class="panel" hidden>
      <div class="panel-title">In Game</div>
      <div id="game-status" class="status-line"></div>
      <div id="game-overview" class="grid two" style="margin-top: 8px;"></div>
      <div id="turn-order" class="button-row" style="margin-top: 8px;"></div>
      <div id="game-actions" class="button-row" style="margin-top: 12px;"></div>
      <div id="placement" class="panel" style="margin-top: 12px;" hidden></div>
    </section>

    <details>
      <summary class="muted">Debug payload</summary>
      <pre id="debug-payload">Loading…</pre>
    </details>
  </div>

  <script>
    (function () {
      const metaEl = document.getElementById('meta');
      const messageEl = document.getElementById('message');
      const lobbySection = document.getElementById('lobby');
      const lobbyStatusEl = document.getElementById('lobby-status');
      const lobbySeatsEl = document.getElementById('lobby-seats');
      const lobbyActionsEl = document.getElementById('lobby-actions');
      const lobbyNoteEl = document.getElementById('lobby-note');
      const gameSection = document.getElementById('game');
      const gameStatusEl = document.getElementById('game-status');
      const gameOverviewEl = document.getElementById('game-overview');
      const turnOrderEl = document.getElementById('turn-order');
      const gameActionsEl = document.getElementById('game-actions');
      const placementEl = document.getElementById('placement');
      const debugPayloadEl = document.getElementById('debug-payload');

      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) {
        showMessage('Not running inside Telegram. Open this page via the bot WebApp button.', 'error');
        return;
      }

      tg.ready();
      if (typeof tg.expand === 'function') tg.expand();

      const safeBottom = (tg.safeAreaInset && tg.safeAreaInset.bottom) || (tg.contentSafeAreaInset && tg.contentSafeAreaInset.bottom) || 0;
      document.documentElement.style.setProperty('--safe-bottom', `${safeBottom}px`);

      const initData = tg.initData || '';
      const maxDisplayNameLength = 32;
      const maxLobbyNameLength = 64;
      const maxLobbySettingsLength = 120;
      const requiredLobbyPlayerCount = 2;
      const invalidGameContextMessage = 'This action belongs to a different chat. Open the correct group to continue.';
      let isCreateLobbyFormOpen = false;
      let isJoinByCodeFormOpen = false;

      function getStartParam() {
        const fromInit = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
        const fromChat = (tg.initDataUnsafe && tg.initDataUnsafe.chat && tg.initDataUnsafe.chat.id)
          ? String(tg.initDataUnsafe.chat.id)
          : '';
        const fromQuery = new URLSearchParams(window.location.search).get('tgWebAppStartParam') || '';
        const fromHash = new URLSearchParams((window.location.hash || '').replace(/^#/, '')).get('tgWebAppStartParam') || '';
        return fromInit || fromChat || fromQuery || fromHash || '';
      }

      const startParam = getStartParam();
      metaEl.textContent = `group: ${startParam || '(missing)'} • initData length: ${initData.length}`;

      function withInitDataHeaders() {
        return { 'X-Telegram-Init-Data': initData };
      }

      function showMessage(text, variant) {
        messageEl.textContent = text;
        messageEl.className = `message ${variant || 'info'}`;
        messageEl.hidden = false;
      }

      function clearMessage() {
        messageEl.hidden = true;
        messageEl.textContent = '';
      }

      function truncateDisplayName(name) {
        const chars = Array.from(name || '');
        if (chars.length <= maxDisplayNameLength) return name;
        return `${chars.slice(0, maxDisplayNameLength - 1).join('')}…`;
      }

      function validateCreateLobbyInput(payload) {
        const name = String((payload && payload.name) || '').trim();
        if (!name) return 'Game name is required.';
        if (Array.from(name).length > maxLobbyNameLength) return `Game name must be ${maxLobbyNameLength} characters or fewer.`;

        const playerCount = Number(payload && payload.playerCount);
        if (!Number.isInteger(playerCount) || playerCount !== requiredLobbyPlayerCount) {
          return `Player count must be ${requiredLobbyPlayerCount} (Pilot + Copilot).`;
        }

        const settings = String((payload && payload.settings) || '').trim();
        if (Array.from(settings).length > maxLobbySettingsLength) {
          return `Lobby settings must be ${maxLobbySettingsLength} characters or fewer.`;
        }

        return null;
      }

      function validateJoinCode(rawCode) {
        const code = String(rawCode || '').trim();
        if (!code) return 'Game code is required.';
        if (!/^\d+$/.test(code)) return 'Enter a numeric game code.';
        return null;
      }

      function createFormField(labelText, input) {
        const field = document.createElement('label');
        field.className = 'form-field';
        const label = document.createElement('span');
        label.textContent = labelText;
        field.appendChild(label);
        field.appendChild(input);
        return field;
      }

      function buildUrl(path, expectedVersion) {
        const params = new URLSearchParams();
        if (startParam) params.set('gameId', startParam);
        if (expectedVersion !== null && expectedVersion !== undefined) params.set('expectedVersion', String(expectedVersion));
        const query = params.toString();
        return query ? `${path}?${query}` : path;
      }

      async function parseResponse(response) {
        const bodyText = await response.text();
        let json = null;
        try {
          json = bodyText ? JSON.parse(bodyText) : null;
        } catch {
          json = null;
        }
        return { ok: response.ok, status: response.status, json, bodyText };
      }

      function normalizeError(result) {
        if (result.status === 401 || result.status === 403) {
          return 'Unauthorized. Reopen the Mini App from the group cockpit button.';
        }
        if (result.json && result.json.error === 'Invalid gameId.') {
          return 'Invalid game code. Use digits from the shared lobby code.';
        }
        if (result.json && typeof result.json.error === 'string' && result.json.error.includes('does not match signed')) {
          return invalidGameContextMessage;
        }
        if (result.json && result.json.error === 'InvalidGameContext') {
          return invalidGameContextMessage;
        }
        if (result.json && result.json.message) return result.json.message;
        if (result.json && result.json.error) return result.json.error;
        if (result.bodyText) return result.bodyText;
        return `${result.status} request failed.`;
      }

      function setDebugPayload(state) {
        debugPayloadEl.textContent = JSON.stringify(state, null, 2);
      }

      function createButton(label, onClick, options) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        if (options && options.primary) btn.classList.add('primary');
        if (options && options.disabled) btn.disabled = true;
        btn.onclick = onClick;
        return btn;
      }

      let currentState = null;

      async function loadState() {
        clearMessage();

        if (!startParam) {
          showMessage('Missing start_param. Open the Mini App from the group cockpit button.', 'warning');
        }

        const response = await fetch(buildUrl('/api/webapp/game-state'), {
          method: 'GET',
          headers: withInitDataHeaders(),
          cache: 'no-store'
        });
        const result = await parseResponse(response);

        if (!result.ok && result.status !== 404) {
          showMessage(normalizeError(result), 'error');
          return;
        }

        const fallbackState = {
          gameId: Number(startParam || 0),
          phase: 'Lobby',
          lobby: { pilot: null, copilot: null, isReady: false },
          cockpit: null,
          gameStatus: 'InProgress',
          viewer: { userId: (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || 0, seat: null }
        };

        const state = result.status === 404 ? fallbackState : result.json;
        applyState(state);
      }

      function applyState(state) {
        currentState = state;
        setDebugPayload(state);
        renderState(state);
      }

      async function runAction(action) {
        clearMessage();
        const result = await action();
        if (!result.ok) {
          if (result.status === 409 && result.json && result.json.error === 'ConcurrencyConflict') {
            showMessage(result.json.message || 'Game state changed. Refreshing…', 'warning');
            await loadState();
            return false;
          }
          showMessage(normalizeError(result), result.status === 409 ? 'warning' : 'error');
          return false;
        }

        if (result.json) {
          applyState(result.json);
        } else {
          await loadState();
        }

        return true;
      }

      function renderLobby(state) {
        lobbySection.hidden = false;
        gameSection.hidden = true;
        lobbySeatsEl.innerHTML = '';
        lobbyActionsEl.innerHTML = '';
        lobbyNoteEl.textContent = '';

        const lobby = state.lobby || { pilot: null, copilot: null, isReady: false };
        const viewerSeat = state.viewer && state.viewer.seat;
        const isFull = !!(lobby.pilot && lobby.copilot);
        const isSoloMode = !!(lobby.isSoloMode);

        lobbyStatusEl.innerHTML = '';
        lobbyStatusEl.appendChild(createBadge(lobby.isReady ? 'Ready to start' : 'Waiting for players', lobby.isReady));
        lobbyStatusEl.appendChild(createBadge(viewerSeat ? `You: ${viewerSeat}` : 'Spectator', !!viewerSeat));
        if (isSoloMode) {
          lobbyStatusEl.appendChild(createBadge('🎮 Solo Mode', true));
        }

        lobbySeatsEl.appendChild(createSeatCard('Pilot', lobby.pilot, 'Waiting for Pilot…'));
        lobbySeatsEl.appendChild(createSeatCard('Copilot', lobby.copilot, 'Waiting for Copilot…'));

        if (isSoloMode) {
          lobbyNoteEl.textContent = '⚠️ Solo mode is for testing only';
        }

        const newButton = createButton(
          isCreateLobbyFormOpen ? 'Cancel New Lobby' : 'New Lobby',
          () => {
            isCreateLobbyFormOpen = !isCreateLobbyFormOpen;
            if (isCreateLobbyFormOpen) isJoinByCodeFormOpen = false;
            renderLobby(state);
          },
          { primary: true }
        );
        lobbyActionsEl.appendChild(newButton);

        const soloButton = createButton(
          'Solo Mode',
          () => runAction(() => postAction('/api/webapp/lobby/new-solo'))
        );
        lobbyActionsEl.appendChild(soloButton);

        if (isCreateLobbyFormOpen) {
          const createForm = document.createElement('form');
          createForm.className = 'form-row';

          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.maxLength = maxLobbyNameLength;
          nameInput.value = 'Sky Team Lobby';
          nameInput.required = true;
          createForm.appendChild(createFormField('Game name', nameInput));

          const playerCountInput = document.createElement('input');
          playerCountInput.type = 'number';
          playerCountInput.min = String(requiredLobbyPlayerCount);
          playerCountInput.max = String(requiredLobbyPlayerCount);
          playerCountInput.value = String(requiredLobbyPlayerCount);
          playerCountInput.required = true;
          createForm.appendChild(createFormField('Player count', playerCountInput));

          const settingsInput = document.createElement('input');
          settingsInput.type = 'text';
          settingsInput.maxLength = maxLobbySettingsLength;
          settingsInput.placeholder = 'Optional settings';
          createForm.appendChild(createFormField('Lobby settings', settingsInput));

          const submitCreateButton = createButton('Create lobby', () => null, { primary: true });
          submitCreateButton.type = 'submit';
          createForm.appendChild(submitCreateButton);

          createForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = {
              name: nameInput.value,
              playerCount: Number(playerCountInput.value),
              settings: settingsInput.value
            };

            const validationError = validateCreateLobbyInput(payload);
            if (validationError) {
              showMessage(validationError, 'warning');
              return;
            }

            const succeeded = await runAction(() => postAction('/api/webapp/lobby/new', payload));
            if (succeeded) isCreateLobbyFormOpen = false;
          });

          lobbyActionsEl.appendChild(createForm);
        }

        if (!viewerSeat && !isFull && !isSoloMode) {
          const joinButton = createButton(
            isJoinByCodeFormOpen ? 'Cancel Join Lobby' : 'Join Lobby',
            () => {
              isJoinByCodeFormOpen = !isJoinByCodeFormOpen;
              if (isJoinByCodeFormOpen) isCreateLobbyFormOpen = false;
              renderLobby(state);
            }
          );
          lobbyActionsEl.appendChild(joinButton);

          if (isJoinByCodeFormOpen) {
            const joinForm = document.createElement('form');
            joinForm.className = 'form-row';

            const gameCodeInput = document.createElement('input');
            gameCodeInput.type = 'text';
            gameCodeInput.inputMode = 'numeric';
            gameCodeInput.placeholder = 'Game code';
            gameCodeInput.value = startParam || '';
            gameCodeInput.required = true;
            joinForm.appendChild(createFormField('Game code', gameCodeInput));

            const submitJoinButton = createButton('Join using code', () => null);
            submitJoinButton.type = 'submit';
            joinForm.appendChild(submitJoinButton);

            joinForm.addEventListener('submit', async (event) => {
              event.preventDefault();
              const gameCode = String(gameCodeInput.value || '').trim();
              const validationError = validateJoinCode(gameCode);
              if (validationError) {
                showMessage(validationError, 'warning');
                return;
              }

              const succeeded = await runAction(() => postAction('/api/webapp/lobby/join', { gameCode }));
              if (succeeded) isJoinByCodeFormOpen = false;
            });

            lobbyActionsEl.appendChild(joinForm);
          }
        }

        const startButton = createButton(
          'Start Game',
          () => runAction(() => postAction('/api/webapp/lobby/start')),
          { disabled: !viewerSeat || !lobby.isReady }
        );
        lobbyActionsEl.appendChild(startButton);

        if (!viewerSeat && isFull) {
          lobbyNoteEl.textContent = 'Lobby is full. Spectators can view, but cannot join.';
        }
      }

      function renderGame(state) {
        lobbySection.hidden = true;
        gameSection.hidden = false;
        gameActionsEl.innerHTML = '';
        gameOverviewEl.innerHTML = '';
        turnOrderEl.innerHTML = '';
        placementEl.innerHTML = '';
        placementEl.hidden = true;

        const cockpit = state.cockpit || {};
        const viewerSeat = state.viewer && state.viewer.seat;

        gameStatusEl.innerHTML = '';
        gameStatusEl.appendChild(createBadge(`Round ${cockpit.roundNumber ?? '-'}`, true));
        gameStatusEl.appendChild(createBadge(`Status: ${cockpit.roundStatus ?? '-'}`));
        if (cockpit.currentPlayer) {
          gameStatusEl.appendChild(createBadge(`Current: ${cockpit.currentPlayer}`, true));
        }
        gameStatusEl.appendChild(createBadge(`Viewer: ${viewerSeat || 'Spectator'}`));

        gameOverviewEl.appendChild(createCard('Round & Turn', [
          { label: 'Placements made', value: cockpit.placementsMade ?? '-' },
          { label: 'Placements remaining', value: cockpit.placementsRemaining ?? '-' },
          { label: 'Game status', value: state.gameStatus || 'InProgress' }
        ]));
        gameOverviewEl.appendChild(createCard('Cockpit', [
          { label: 'Axis position', value: cockpit.axisPosition ?? '-' },
          { label: 'Engines speed', value: cockpit.enginesSpeed ?? '-' },
          { label: 'Approach', value: `${cockpit.approachPosition ?? '-'} / ${cockpit.approachSegments ?? '-'}` }
        ]));
        gameOverviewEl.appendChild(createCard('Systems', [
          { label: 'Brakes', value: `${cockpit.brakesActivated ?? 0} / ${cockpit.brakesCapability ?? 0}` },
          { label: 'Flaps', value: cockpit.flapsValue ?? '-' },
          { label: 'Landing gear', value: cockpit.landingGearValue ?? '-' }
        ]));
        gameOverviewEl.appendChild(createCard('Flight', [
          { label: 'Planes remaining', value: cockpit.planesRemaining ?? '-' },
          { label: 'Coffee tokens', value: cockpit.coffeeTokens ?? '-' },
          { label: 'Aero thresholds', value: `${cockpit.blueAerodynamicsThreshold ?? '-'} / ${cockpit.orangeAerodynamicsThreshold ?? '-'}` }
        ]));

        const currentPlayer = (cockpit.currentPlayer || '').toString();
        turnOrderEl.appendChild(createBadge('Pilot', currentPlayer.toLowerCase() === 'pilot'));
        turnOrderEl.appendChild(createBadge('Copilot', currentPlayer.toLowerCase() === 'copilot'));

        const refreshBtn = createButton('Refresh', () => loadState());
        gameActionsEl.appendChild(refreshBtn);

        const canUndo = !!(state.privateHand && viewerSeat);
        const undoBtn = createButton(
          'Undo',
          () => runAction(() => postAction('/api/webapp/game/undo', null, state.version)),
          { disabled: !canUndo }
        );
        gameActionsEl.appendChild(undoBtn);

        const canRoll = !!viewerSeat && String(cockpit.roundStatus || '').toLowerCase() === 'awaitingroll';
        const rollBtn = createButton(
          'Roll',
          () => runAction(() => postAction('/api/webapp/game/roll', null, state.version)),
          { primary: true, disabled: !canRoll }
        );
        gameActionsEl.appendChild(rollBtn);

        renderPlacement(state, viewerSeat, currentPlayer);
      }

      function renderPlacement(state, viewerSeat, currentPlayer) {
        const hand = state.privateHand;
        if (!hand || !viewerSeat) return;
        if (String(hand.currentPlayer).toLowerCase() !== String(hand.seat).toLowerCase()) return;
        if (String(currentPlayer).toLowerCase() !== String(viewerSeat || '').toLowerCase()) return;

        const availableDice = (hand.dice || []).filter(d => !d.isUsed);
        if (availableDice.length === 0) return;

        placementEl.hidden = false;
        placementEl.innerHTML = '';

        const title = document.createElement('div');
        title.className = 'panel-title';
        title.textContent = 'Place a die';
        placementEl.appendChild(title);

        const subtitle = document.createElement('div');
        subtitle.className = 'muted';
        subtitle.textContent = 'Select a die, then a target + option.';
        placementEl.appendChild(subtitle);

        const dieRow = document.createElement('div');
        const targetRow = document.createElement('div');
        const optionRow = document.createElement('div');
        const actionRow = document.createElement('div');
        dieRow.className = 'button-row';
        targetRow.className = 'button-row';
        optionRow.className = 'button-row';
        actionRow.className = 'button-row';
        dieRow.style.marginTop = '10px';
        targetRow.style.marginTop = '8px';
        optionRow.style.marginTop = '8px';
        actionRow.style.marginTop = '8px';
        placementEl.appendChild(dieRow);
        placementEl.appendChild(targetRow);
        placementEl.appendChild(optionRow);
        placementEl.appendChild(actionRow);

        let selectedDieIndex = availableDice[0].index;
        let selectedCommandId = '';

        const getCommandsForDie = (dieIndex) => {
          const die = hand.dice.find(d => d.index === dieIndex);
          if (!die) return [];
          const marker = `:${die.value}`;
          return hand.availableCommands.filter(c => String(c.commandId).includes(marker));
        };

        const renderTargetsAndOptions = () => {
          const commands = getCommandsForDie(selectedDieIndex);
          const groups = {};
          commands.forEach(c => {
            const key = String(c.commandId).split(':')[0] || 'Target';
            groups[key] = groups[key] || [];
            groups[key].push(c);
          });

          targetRow.innerHTML = '';
          optionRow.innerHTML = '';

          const targets = Object.keys(groups);
          const selectedTarget = targets[0] || '';
          const targetCommands = groups[selectedTarget] || [];
          selectedCommandId = targetCommands[0] ? targetCommands[0].commandId : '';

          targets.forEach(target => {
            const btn = createButton(target, () => {
              selectedCommandId = groups[target][0]?.commandId || '';
              renderOptions(groups[target] || []);
              Array.from(targetRow.querySelectorAll('button')).forEach(b => { b.disabled = b.textContent === target; });
            }, { disabled: target === selectedTarget });
            targetRow.appendChild(btn);
          });

          renderOptions(targetCommands);
        };

        let placeBtn = null;

        const renderOptions = (options) => {
          optionRow.innerHTML = '';
          selectedCommandId = options[0] ? options[0].commandId : '';
          options.forEach(option => {
            const label = option.displayName || option.commandId;
            const btn = createButton(label, () => {
              selectedCommandId = option.commandId;
              Array.from(optionRow.querySelectorAll('button')).forEach(b => { b.disabled = b.dataset.commandId === selectedCommandId; });
              if (placeBtn) placeBtn.disabled = !selectedCommandId;
            }, { disabled: option.commandId === selectedCommandId });
            btn.dataset.commandId = option.commandId;
            optionRow.appendChild(btn);
          });
          if (placeBtn) placeBtn.disabled = !selectedCommandId;
        };

        availableDice.forEach(die => {
          const btn = createButton(`Die ${die.index}: ${die.value}`, () => {
            selectedDieIndex = die.index;
            Array.from(dieRow.querySelectorAll('button')).forEach(b => { b.disabled = b.dataset.dieIndex === String(selectedDieIndex); });
            renderTargetsAndOptions();
          }, { disabled: die.index === selectedDieIndex });
          btn.dataset.dieIndex = String(die.index);
          dieRow.appendChild(btn);
        });

        renderTargetsAndOptions();

        placeBtn = createButton('Place selected die', () => runAction(() => postAction(
          '/api/webapp/game/place',
          { dieIndex: selectedDieIndex, commandId: selectedCommandId },
          state.version
        )), { primary: true, disabled: !selectedCommandId });
        actionRow.appendChild(placeBtn);
      }

      function renderState(state) {
        if (String(state.phase).toLowerCase() === 'lobby') {
          renderLobby(state);
        } else {
          renderGame(state);
        }
      }

      function createBadge(text, isActive) {
        const badge = document.createElement('div');
        badge.className = `badge${isActive ? ' active' : ''}`;
        badge.textContent = text;
        return badge;
      }

      function createSeatCard(label, seat, placeholder) {
        const card = document.createElement('div');
        card.className = 'seat-card';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';

        const name = seat ? truncateDisplayName(seat.displayName) : placeholder;
        const initials = seat
          ? (truncateDisplayName(seat.displayName).split(/\s+/).map(seg => seg[0]).join('').slice(0, 2) || label[0])
          : label[0];
        avatar.textContent = initials.toUpperCase();

        const details = document.createElement('div');
        details.className = 'seat-details';
        const nameEl = document.createElement('div');
        nameEl.className = 'seat-name';
        nameEl.textContent = name;
        const roleEl = document.createElement('div');
        roleEl.className = 'seat-role';
        roleEl.textContent = label;
        details.appendChild(nameEl);
        details.appendChild(roleEl);

        card.appendChild(avatar);
        card.appendChild(details);
        return card;
      }

      function createCard(title, stats) {
        const card = document.createElement('div');
        card.className = 'card';
        const titleEl = document.createElement('div');
        titleEl.className = 'card-title';
        titleEl.textContent = title;
        card.appendChild(titleEl);
        stats.forEach(stat => {
          const row = document.createElement('div');
          row.className = 'stat';
          const label = document.createElement('span');
          label.textContent = stat.label;
          const value = document.createElement('span');
          value.textContent = stat.value;
          row.appendChild(label);
          row.appendChild(value);
          card.appendChild(row);
        });
        return card;
      }

      async function postAction(path, body, expectedVersion) {
        const response = await fetch(buildUrl(path, expectedVersion), {
          method: 'POST',
          headers: body
            ? { ...withInitDataHeaders(), 'Content-Type': 'application/json' }
            : withInitDataHeaders(),
          body: body ? JSON.stringify(body) : null,
          cache: 'no-store'
        });
        return parseResponse(response);
      }

      loadState().catch((err) => {
        showMessage(`Error calling backend: ${err && err.message ? err.message : String(err)}`, 'error');
      });
    })();
  </script>
</body>
</html>
