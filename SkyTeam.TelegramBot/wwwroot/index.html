<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sky Team</title>
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #meta { opacity: 0.8; font-size: 12px; margin-bottom: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; padding: 12px; border: 1px solid rgba(127,127,127,.35); border-radius: 8px; }
  </style>
</head>
<body>
  <div id="meta"></div>
  <div id="actions"></div>
  <pre id="app">Loading…</pre>

  <script>
    (function () {
      const metaEl = document.getElementById('meta');
      const actionsEl = document.getElementById('actions');
      const appEl = document.getElementById('app');

      function setText(text) {
        appEl.textContent = text;
      }

      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) {
        setText('Not running inside Telegram. Open this page via the bot WebApp button.');
        return;
      }

      tg.ready();

      const initData = tg.initData || '';

      function getStartParam() {
        const fromInit = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
        const fromQuery = new URLSearchParams(window.location.search).get('tgWebAppStartParam') || '';
        const fromHash = new URLSearchParams((window.location.hash || '').replace(/^#/, '')).get('tgWebAppStartParam') || '';
        return fromInit || fromQuery || fromHash || '';
      }

      const startParam = getStartParam();

      metaEl.textContent = `start_param: ${startParam || '(empty)'} • initData length: ${initData.length}`;

      if (!startParam) {
        setText('Missing start_param. Open the Mini App from the group cockpit button so Telegram provides the gameId.\n\nCalling backend anyway for diagnostics…');
      } else {
        setText('Calling backend…');
      }

      function withInitDataHeaders() {
        return { 'X-Telegram-Init-Data': initData };
      }

      async function parseResponse(r) {
        const bodyText = await r.text();
        const json = bodyText ? JSON.parse(bodyText) : null;
        return { ok: r.ok, status: r.status, json };
      }

      function renderLobbyActions(gameId) {
        actionsEl.innerHTML = '';

        const labels = [
          ['New', '/api/webapp/lobby/new'],
          ['Join', '/api/webapp/lobby/join'],
          ['Start', '/api/webapp/lobby/start']
        ];

        labels.forEach(([label, path]) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = label;
          btn.style.marginRight = '8px';
          btn.onclick = async () => {
            btn.disabled = true;
            try {
              const r = await fetch(`${path}?gameId=${encodeURIComponent(gameId)}`, {
                method: 'POST',
                headers: withInitDataHeaders(),
                cache: 'no-store'
              });
              const result = await parseResponse(r);
              if (!result.ok) {
                throw new Error((result.json && result.json.error) || `${result.status} action failed`);
              }

              await loadState();
            } catch (err) {
              setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
            } finally {
              btn.disabled = false;
            }
          };
          actionsEl.appendChild(btn);
        });
      }

      function renderInGameActions(gameId, state) {
        actionsEl.innerHTML = '';

        const refreshBtn = document.createElement('button');
        refreshBtn.type = 'button';
        refreshBtn.textContent = 'Refresh';
        refreshBtn.onclick = loadState;
        actionsEl.appendChild(refreshBtn);

        const canRoll = String(state.cockpit && state.cockpit.roundStatus).toLowerCase() === 'awaitingroll'
          && !!(state.viewer && state.viewer.seat);
        if (!canRoll) return;

        const rollBtn = document.createElement('button');
        rollBtn.type = 'button';
        rollBtn.textContent = 'Roll';
        rollBtn.style.marginLeft = '8px';
        rollBtn.onclick = async () => {
          rollBtn.disabled = true;
          try {
            const r = await fetch(`/api/webapp/game/roll?gameId=${encodeURIComponent(gameId)}`, {
              method: 'POST',
              headers: withInitDataHeaders(),
              cache: 'no-store'
            });

            const result = await parseResponse(r);
            if (!result.ok) {
              throw new Error((result.json && result.json.error) || `${result.status} action failed`);
            }

            await loadState();
          } catch (err) {
            setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
          } finally {
            rollBtn.disabled = false;
          }
        };

        actionsEl.appendChild(rollBtn);
      }

      function renderState(state) {
        if (String(state.phase).toLowerCase() === 'lobby') {
          setText(JSON.stringify(state, null, 2));
          return;
        }

        const lines = [];
        lines.push(`Phase: ${state.phase}`);
        lines.push(`Viewer seat: ${(state.viewer && state.viewer.seat) || 'Spectator'}`);
        lines.push('');

        if (state.cockpit) {
          lines.push('Public cockpit');
          lines.push(`- Round: ${state.cockpit.roundNumber} (${state.cockpit.roundStatus})`);
          lines.push(`- Axis: ${state.cockpit.axisPosition}`);
          lines.push(`- Engines speed: ${state.cockpit.enginesSpeed ?? 'n/a'}`);
          lines.push(`- Approach: ${state.cockpit.approachPosition}/${state.cockpit.approachSegments}`);
          lines.push(`- Planes remaining: ${state.cockpit.planesRemaining}`);
          lines.push(`- Coffee tokens: ${state.cockpit.coffeeTokens}`);
          lines.push('');
        }

        if (state.privateHand) {
          lines.push('Private hand (only you)');
          lines.push(`- Seat: ${state.privateHand.seat}`);
          lines.push(`- Current player: ${state.privateHand.currentPlayer}`);
          lines.push(`- Placements remaining: ${state.privateHand.placementsRemaining}`);
          lines.push(`- Dice: ${state.privateHand.dice.map(d => `${d.index}:${d.value}${d.isUsed ? '✓' : ''}`).join(', ')}`);
          lines.push(`- Commands: ${state.privateHand.availableCommands.length}`);
        } else {
          lines.push('Private hand unavailable (not seated or round not rolled).');
        }

        lines.push('');
        lines.push('Raw payload:');
        lines.push(JSON.stringify(state, null, 2));
        setText(lines.join('\n'));
      }

      async function loadState() {
        const gameId = startParam;
        const r = await fetch(`/api/webapp/game-state?gameId=${encodeURIComponent(gameId)}`, {
          method: 'GET',
          headers: withInitDataHeaders(),
          cache: 'no-store'
        });

        const result = await parseResponse(r);
        if (!result.ok && result.status !== 404) {
          throw new Error((result.json && result.json.error) || `${result.status} game-state failed`);
        }

        const state = result.status === 404 ? {
          gameId: Number(gameId),
          phase: 'Lobby',
          lobby: { pilot: null, copilot: null, isReady: false },
          cockpit: null,
          gameStatus: 'InProgress',
          viewer: { userId: (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || 0, seat: null }
        } : result.json;

        if (String(state.phase).toLowerCase() === 'lobby')
          renderLobbyActions(gameId);
        else
          renderInGameActions(gameId, state);

        renderState(state);
      }

      loadState().catch((err) => {
        setText('Error calling backend:\n\n' + (err && err.message ? err.message : String(err)));
      });
    })();
  </script>
</body>
</html>
