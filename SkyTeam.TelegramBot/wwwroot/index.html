<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sky Team</title>
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #meta { opacity: 0.8; font-size: 12px; margin-bottom: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; padding: 12px; border: 1px solid rgba(127,127,127,.35); border-radius: 8px; }
  </style>
</head>
<body>
  <div id="meta"></div>
  <div id="actions"></div>
  <pre id="app">Loading…</pre>

  <script>
    (function () {
      const metaEl = document.getElementById('meta');
      const actionsEl = document.getElementById('actions');
      const appEl = document.getElementById('app');

      function setText(text) {
        appEl.textContent = text;
      }

      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) {
        setText('Not running inside Telegram. Open this page via the bot WebApp button.');
        return;
      }

      tg.ready();

      const initData = tg.initData || '';

      function getStartParam() {
        const fromInit = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
        const fromQuery = new URLSearchParams(window.location.search).get('tgWebAppStartParam') || '';
        const fromHash = new URLSearchParams((window.location.hash || '').replace(/^#/, '')).get('tgWebAppStartParam') || '';
        return fromInit || fromQuery || fromHash || '';
      }

      const startParam = getStartParam();

      metaEl.textContent = `start_param: ${startParam || '(empty)'} • initData length: ${initData.length}`;

      if (!startParam) {
        setText('Missing start_param. Open the Mini App from the group cockpit button so Telegram provides the gameId.\n\nCalling backend anyway for diagnostics…');
      } else {
        setText('Calling backend…');
      }

      function withInitDataHeaders() {
        return { 'X-Telegram-Init-Data': initData };
      }

      async function parseResponse(r) {
        const bodyText = await r.text();
        const json = bodyText ? JSON.parse(bodyText) : null;
        return { ok: r.ok, status: r.status, json };
      }

      function renderLobbyActions(gameId) {
        actionsEl.innerHTML = '';

        const labels = [
          ['New', '/api/webapp/lobby/new'],
          ['Join', '/api/webapp/lobby/join'],
          ['Start', '/api/webapp/lobby/start']
        ];

        labels.forEach(([label, path]) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = label;
          btn.style.marginRight = '8px';
          btn.onclick = async () => {
            btn.disabled = true;
            try {
              const r = await fetch(`${path}?gameId=${encodeURIComponent(gameId)}`, {
                method: 'POST',
                headers: withInitDataHeaders(),
                cache: 'no-store'
              });
              const result = await parseResponse(r);
              if (!result.ok) {
                throw new Error((result.json && result.json.error) || `${result.status} action failed`);
              }

              await loadState();
            } catch (err) {
              setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
            } finally {
              btn.disabled = false;
            }
          };
          actionsEl.appendChild(btn);
        });
      }

      function renderInGameActions(gameId, state) {
        actionsEl.innerHTML = '';

        const refreshBtn = document.createElement('button');
        refreshBtn.type = 'button';
        refreshBtn.textContent = 'Refresh';
        refreshBtn.onclick = loadState;
        actionsEl.appendChild(refreshBtn);

        const canUndo = !!(state.privateHand && state.viewer && state.viewer.seat);
        if (canUndo) {
          const undoBtn = document.createElement('button');
          undoBtn.type = 'button';
          undoBtn.textContent = 'Undo';
          undoBtn.style.marginLeft = '8px';
          undoBtn.onclick = async () => {
            undoBtn.disabled = true;
            try {
              const r = await fetch(`/api/webapp/game/undo?gameId=${encodeURIComponent(gameId)}`, {
                method: 'POST',
                headers: withInitDataHeaders(),
                cache: 'no-store'
              });

              const result = await parseResponse(r);
              if (!result.ok) {
                throw new Error((result.json && result.json.error) || `${result.status} action failed`);
              }

              await loadState();
            } catch (err) {
              setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
            } finally {
              undoBtn.disabled = false;
            }
          };

          actionsEl.appendChild(undoBtn);
        }

        const canRoll = String(state.cockpit && state.cockpit.roundStatus).toLowerCase() === 'awaitingroll'
          && !!(state.viewer && state.viewer.seat);
        if (canRoll) {
          const rollBtn = document.createElement('button');
          rollBtn.type = 'button';
          rollBtn.textContent = 'Roll';
          rollBtn.style.marginLeft = '8px';
          rollBtn.onclick = async () => {
            rollBtn.disabled = true;
            try {
              const r = await fetch(`/api/webapp/game/roll?gameId=${encodeURIComponent(gameId)}`, {
                method: 'POST',
                headers: withInitDataHeaders(),
                cache: 'no-store'
              });

              const result = await parseResponse(r);
              if (!result.ok) {
                throw new Error((result.json && result.json.error) || `${result.status} action failed`);
              }

              await loadState();
            } catch (err) {
              setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
            } finally {
              rollBtn.disabled = false;
            }
          };

          actionsEl.appendChild(rollBtn);
        }

        if (!state.privateHand || !state.privateHand.availableCommands || !state.viewer || !state.viewer.seat) return;
        if (String(state.privateHand.currentPlayer).toLowerCase() !== String(state.privateHand.seat).toLowerCase()) return;

        const availableDice = state.privateHand.dice.filter(d => !d.isUsed);
        if (availableDice.length === 0) return;

        const placementBox = document.createElement('div');
        placementBox.style.marginTop = '12px';
        placementBox.style.paddingTop = '8px';
        placementBox.style.borderTop = '1px solid rgba(127,127,127,.35)';
        actionsEl.appendChild(placementBox);

        const heading = document.createElement('div');
        heading.textContent = 'Placement flow: die → target → option';
        heading.style.marginBottom = '8px';
        placementBox.appendChild(heading);

        let selectedDieIndex = availableDice[0].index;
        let selectedTarget = '';
        let selectedCommandId = '';

        const dieRow = document.createElement('div');
        const targetRow = document.createElement('div');
        const optionRow = document.createElement('div');
        const actionRow = document.createElement('div');
        dieRow.style.marginBottom = '8px';
        targetRow.style.marginBottom = '8px';
        optionRow.style.marginBottom = '8px';

        placementBox.appendChild(dieRow);
        placementBox.appendChild(targetRow);
        placementBox.appendChild(optionRow);
        placementBox.appendChild(actionRow);

        const getCommandsForDie = (dieIndex) => {
          const die = state.privateHand.dice.find(d => d.index === dieIndex);
          if (!die) return [];
          const marker = `:${die.value}`;
          return state.privateHand.availableCommands.filter(c => String(c.commandId).includes(marker));
        };

        const parseOptionLabel = (command) => {
          const commandId = String(command.commandId);
          const displayName = String(command.displayName || commandId);
          const tokenPart = commandId.includes('>') ? ' • token adjust' : '';
          return `${displayName}${tokenPart}`;
        };

        const renderTargetsAndOptions = () => {
          const commands = getCommandsForDie(selectedDieIndex);
          const groups = {};
          commands.forEach(c => {
            const key = String(c.commandId).split(':')[0] || 'Target';
            groups[key] = groups[key] || [];
            groups[key].push(c);
          });

          targetRow.innerHTML = '';
          optionRow.innerHTML = '';
          selectedTarget = Object.keys(groups)[0] || '';
          const targetCommands = groups[selectedTarget] || [];
          selectedCommandId = targetCommands[0] ? targetCommands[0].commandId : '';

          Object.keys(groups).forEach(target => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = target;
            btn.style.marginRight = '6px';
            btn.style.marginBottom = '6px';
            if (target === selectedTarget) btn.disabled = true;
            btn.onclick = () => {
              selectedTarget = target;
              renderOptions(groups[selectedTarget] || []);
              Array.from(targetRow.querySelectorAll('button')).forEach(b => { b.disabled = b.textContent === selectedTarget; });
            };
            targetRow.appendChild(btn);
          });

          function renderOptions(targetOptions) {
            optionRow.innerHTML = '';
            selectedCommandId = targetOptions[0] ? targetOptions[0].commandId : '';

            targetOptions.forEach(option => {
              const btn = document.createElement('button');
              btn.type = 'button';
              btn.textContent = parseOptionLabel(option);
              btn.style.marginRight = '6px';
              btn.style.marginBottom = '6px';
              if (option.commandId === selectedCommandId) btn.disabled = true;
              btn.onclick = () => {
                selectedCommandId = option.commandId;
                Array.from(optionRow.querySelectorAll('button')).forEach(b => { b.disabled = b.dataset.commandId === selectedCommandId; });
              };
              btn.dataset.commandId = option.commandId;
              optionRow.appendChild(btn);
            });
          }

          renderOptions(targetCommands);
        };

        dieRow.innerHTML = '';
        availableDice.forEach(die => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = `Die ${die.index}: ${die.value}`;
          btn.style.marginRight = '6px';
          btn.style.marginBottom = '6px';
          if (die.index === selectedDieIndex) btn.disabled = true;
          btn.onclick = () => {
            selectedDieIndex = die.index;
            Array.from(dieRow.querySelectorAll('button')).forEach(b => { b.disabled = b.dataset.dieIndex === String(selectedDieIndex); });
            renderTargetsAndOptions();
          };
          btn.dataset.dieIndex = String(die.index);
          dieRow.appendChild(btn);
        });

        renderTargetsAndOptions();

        const placeBtn = document.createElement('button');
        placeBtn.type = 'button';
        placeBtn.textContent = 'Place selected die';
        placeBtn.onclick = async () => {
          placeBtn.disabled = true;
          try {
            if (!selectedCommandId) throw new Error('No command option available for selected die.');

            const r = await fetch(`/api/webapp/game/place?gameId=${encodeURIComponent(gameId)}`, {
              method: 'POST',
              headers: { ...withInitDataHeaders(), 'Content-Type': 'application/json' },
              body: JSON.stringify({ dieIndex: selectedDieIndex, commandId: selectedCommandId }),
              cache: 'no-store'
            });

            const result = await parseResponse(r);
            if (!result.ok) {
              throw new Error((result.json && result.json.error) || `${result.status} action failed`);
            }

            await loadState();
          } catch (err) {
            setText('Action failed:\n\n' + (err && err.message ? err.message : String(err)));
          } finally {
            placeBtn.disabled = false;
          }
        };

        actionRow.appendChild(placeBtn);
      }

      function renderState(state) {
        if (String(state.phase).toLowerCase() === 'lobby') {
          setText(JSON.stringify(state, null, 2));
          return;
        }

        const lines = [];
        lines.push(`Phase: ${state.phase}`);
        lines.push(`Viewer seat: ${(state.viewer && state.viewer.seat) || 'Spectator'}`);
        lines.push('');

        if (state.cockpit) {
          lines.push('Public cockpit');
          lines.push(`- Round: ${state.cockpit.roundNumber} (${state.cockpit.roundStatus})`);
          lines.push(`- Axis: ${state.cockpit.axisPosition}`);
          lines.push(`- Engines speed: ${state.cockpit.enginesSpeed ?? 'n/a'}`);
          lines.push(`- Approach: ${state.cockpit.approachPosition}/${state.cockpit.approachSegments}`);
          lines.push(`- Planes remaining: ${state.cockpit.planesRemaining}`);
          lines.push(`- Coffee tokens: ${state.cockpit.coffeeTokens}`);
          lines.push('');
        }

        if (state.privateHand) {
          lines.push('Private hand (only you)');
          lines.push(`- Seat: ${state.privateHand.seat}`);
          lines.push(`- Current player: ${state.privateHand.currentPlayer}`);
          lines.push(`- Placements remaining: ${state.privateHand.placementsRemaining}`);
          lines.push(`- Dice: ${state.privateHand.dice.map(d => `${d.index}:${d.value}${d.isUsed ? '✓' : ''}`).join(', ')}`);
          lines.push(`- Commands: ${state.privateHand.availableCommands.length}`);
        } else {
          lines.push('Private hand unavailable (not seated or round not rolled).');
        }

        lines.push('');
        lines.push('Raw payload:');
        lines.push(JSON.stringify(state, null, 2));
        setText(lines.join('\n'));
      }

      async function loadState() {
        const gameId = startParam;
        const r = await fetch(`/api/webapp/game-state?gameId=${encodeURIComponent(gameId)}`, {
          method: 'GET',
          headers: withInitDataHeaders(),
          cache: 'no-store'
        });

        const result = await parseResponse(r);
        if (!result.ok && result.status !== 404) {
          throw new Error((result.json && result.json.error) || `${result.status} game-state failed`);
        }

        const state = result.status === 404 ? {
          gameId: Number(gameId),
          phase: 'Lobby',
          lobby: { pilot: null, copilot: null, isReady: false },
          cockpit: null,
          gameStatus: 'InProgress',
          viewer: { userId: (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || 0, seat: null }
        } : result.json;

        if (String(state.phase).toLowerCase() === 'lobby')
          renderLobbyActions(gameId);
        else
          renderInGameActions(gameId, state);

        renderState(state);
      }

      loadState().catch((err) => {
        setText('Error calling backend:\n\n' + (err && err.message ? err.message : String(err)));
      });
    })();
  </script>
</body>
</html>
